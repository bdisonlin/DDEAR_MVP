name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /DDEAR_MVP/
          # 若已將後端部署至外部主機，可在 repo Settings → Secrets 中設定以下兩個變數：
          # VITE_SIMULATION_API_URL: https://your-backend.example.com/api/v1
          # VITE_DATA_API_URL:       https://your-data-service.example.com/api/v1
          VITE_SIMULATION_API_URL: ${{ vars.VITE_SIMULATION_API_URL }}
          VITE_DATA_API_URL: ${{ vars.VITE_DATA_API_URL }}

      # GitHub Pages 不支援 SPA 路由，複製 index.html → 404.html
      # 讓直接輸入 /strategy 等路徑時，仍能正常渲染 React app
      - name: Create 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
