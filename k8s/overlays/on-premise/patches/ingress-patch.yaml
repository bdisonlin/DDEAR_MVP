apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddear-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    # cert-manager.io/cluster-issuer: "internal-ca"   # Uncomment when cert-manager is installed
spec:
  # tls:                                               # Uncomment to enable TLS
  #   - hosts: [ddear.corp.internal]
  #     secretName: ddear-tls
  rules:
    - host: ddear.corp.internal                        # Change to your internal hostname
      http:
        paths:
          - path: /api/simulation
            pathType: Prefix
            backend:
              service: { name: simulation-service, port: { number: 8000 } }
          - path: /api/data
            pathType: Prefix
            backend:
              service: { name: data-service, port: { number: 8080 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
