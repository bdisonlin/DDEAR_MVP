apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# ── GCP GKE overrides ─────────────────────────────────────────────────────────
# Ingress: GKE Ingress (GCE L7 LB) or nginx-ingress
# Storage: Filestore (ReadWriteMany) via filestore-csi-driver
# Registry: Artifact Registry

patches:
  - path: patches/pvc-patch.yaml

images:
  - name: ddear/frontend
    newName: asia-east1-docker.pkg.dev/PROJECT_ID/ddear/frontend
    newTag: "1.0.0"
  - name: ddear/simulation-service
    newName: asia-east1-docker.pkg.dev/PROJECT_ID/ddear/simulation-service
    newTag: "1.0.0"
  - name: ddear/data-service
    newName: asia-east1-docker.pkg.dev/PROJECT_ID/ddear/data-service
    newTag: "1.0.0"
