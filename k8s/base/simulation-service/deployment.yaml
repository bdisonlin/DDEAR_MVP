apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simulation-service
  template:
    metadata:
      labels:
        app: simulation-service
    spec:
      containers:
        - name: simulation-service
          image: ddear/simulation-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: ALLOWED_ORIGINS
              value: "*"
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
