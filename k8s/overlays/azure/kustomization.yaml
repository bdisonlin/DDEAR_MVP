apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# ── Azure AKS overrides ───────────────────────────────────────────────────────
# Ingress: Application Gateway Ingress Controller (AGIC) or nginx-ingress
# Storage: Azure Files (ReadWriteMany) via azurefile-csi
# Registry: Azure Container Registry (ACR)

patches:
  - path: patches/pvc-patch.yaml

images:
  - name: ddear/frontend
    newName: ddearacr.azurecr.io/ddear/frontend
    newTag: "1.0.0"
  - name: ddear/simulation-service
    newName: ddearacr.azurecr.io/ddear/simulation-service
    newTag: "1.0.0"
  - name: ddear/data-service
    newName: ddearacr.azurecr.io/ddear/data-service
    newTag: "1.0.0"
