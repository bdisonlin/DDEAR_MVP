version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DDEAR — Local Development Environment
# Mirrors the K8s service topology. Each service talks to the others by name.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL — Persistent store ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ddear-postgres
    environment:
      POSTGRES_DB: ddear
      POSTGRES_USER: ddear
      POSTGRES_PASSWORD: ddear_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddear -d ddear"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ddear-net

  # ── Redis — Hot cache (baselines + simulation results) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: ddear-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - ddear-net

  # ── Python FastAPI — Simulation Engine ──────────────────────────────────────
  simulation-service:
    build:
      context: ./services/simulation-service
      dockerfile: Dockerfile
    image: ddear/simulation-service:dev
    container_name: ddear-simulation
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80
      - DATABASE_URL=postgresql://ddear:ddear_dev@postgres:5432/ddear
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./services/simulation-service/app/core/tariff_data.json:/app/app/core/tariff_data.json
    restart: unless-stopped
    networks:
      - ddear-net

  # ── Go — Data / File Service ─────────────────────────────────────────────────
  data-service:
    build:
      context: ./services/data-service
      dockerfile: Dockerfile
    image: ddear/data-service:dev
    container_name: ddear-data
    ports:
      - "8080:8080"
    environment:
      - DATA_DIR=/data/uploads
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80
    volumes:
      - data-uploads:/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ddear-net

  # ── React Frontend (nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ddear/frontend:dev
    container_name: ddear-frontend
    ports:
      - "80:80"
    depends_on:
      simulation-service:
        condition: service_healthy
      data-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ddear-net

volumes:
  data-uploads:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  ddear-net:
    driver: bridge
